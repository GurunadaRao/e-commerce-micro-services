apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
data:
  mimir.yaml: |
    target: all
    multitenancy_enabled: false

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: info

    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir/data

    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/blocks

    alertmanager:
      data_dir: /data/mimir/alertmanager
      enable_api: true

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/rules
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  labels:
    app: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:2.12.0
          args:
            - "-config.file=/etc/mimir/mimir.yaml"
          ports:
            - containerPort: 9009
              name: http
            - containerPort: 9095
              name: grpc
          resources:
            limits:
              cpu: "1.0"
              memory: 1Gi
            requests:
              cpu: "0.2"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 9009
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 9009
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
            - name: mimir-storage
              mountPath: /data/mimir
      volumes:
        - name: config
          configMap:
            name: mimir-config
        - name: mimir-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
spec:
  ports:
    - port: 9009
      targetPort: 9009
      name: http
    - port: 9095
      targetPort: 9095
      name: grpc
  selector:
    app: mimir
