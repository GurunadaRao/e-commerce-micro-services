apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  labels:
    app: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: payments:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: PORT
              value: "3004"
            - name: MONGODB_PAYMENTS_URI
              value: "mongodb://mongodb:27017/payments"
            - name: RABBITMQ_URL
              value: "amqp://rabbitmq:5672"
            - name: PAYMENTS_QUEUE
              value: "payments"
            - name: PAYMENT_RESULTS_QUEUE
              value: "payment_results"
            - name: JWT_SECRET
              value: "supersecret"
            - name: OTEL_SERVICE_NAME
              value: "payments"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318/v1/traces"
          resources:
            limits:
              cpu: "0.5"
              memory: 512Mi
            requests:
              cpu: "0.1"
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payments
spec:
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  selector:
    app: payments
