receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: 'microservices'
          scrape_interval: 5s
          static_configs:
            - targets: ['auth:3000', 'product:3001', 'order:3002', 'payments:3004']

processors:
  batch:

exporters:
  # Metrics: Export to Mimir using Prometheus Remote Write
  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true

  # Logs: Export to Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # Traces: Export to Tempo using OTLP gRPC
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
